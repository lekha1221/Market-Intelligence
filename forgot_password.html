<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — RE·ANALYZE</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --bg2: #161b27; --bg3: #1e2535;
      --border: rgba(99,120,170,.18); --text: #e2e8f0; --muted: #64748b;
      --teal: #0d9488; --error: #f43f5e; --success: #22c55e;
      --mono: 'JetBrains Mono', monospace; --sans: 'Inter', sans-serif; --r: 8px;
    }
    body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
    .bg-glow { position: absolute; inset: 0; pointer-events: none; background: radial-gradient(ellipse 60% 50% at 50% 40%, rgba(13,148,136,.1) 0%, transparent 60%); }
    .bg-grid { position: absolute; inset: 0; pointer-events: none; background-image: linear-gradient(rgba(99,120,170,.04) 1px, transparent 1px), linear-gradient(90deg, rgba(99,120,170,.04) 1px, transparent 1px); background-size: 48px 48px; }
    .card { position: relative; z-index: 1; background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 2.5rem 2.25rem; width: 100%; max-width: 420px; margin: 1rem; }
    .logo { font-family: var(--mono); font-size: 1.1rem; color: var(--teal); letter-spacing: .05em; margin-bottom: 1.75rem; display: block; text-align: center; text-decoration: none; }
    .logo span { color: var(--muted); }
    h1 { font-size: 1.35rem; font-weight: 700; text-align: center; margin-bottom: .4rem; }
    .subtitle { font-size: .78rem; color: var(--muted); text-align: center; margin-bottom: 2rem; line-height: 1.6; }
    .form-group { margin-bottom: 1rem; }
    label { display: block; font-size: .75rem; font-weight: 500; color: var(--muted); margin-bottom: .45rem; letter-spacing: .02em; }
    input { width: 100%; padding: .7rem .9rem; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--r); color: var(--text); font-family: var(--sans); font-size: .85rem; outline: none; transition: border-color .2s; }
    input:focus { border-color: var(--teal); }
    input::placeholder { color: var(--muted); }
    .alert { border-radius: var(--r); padding: .65rem .9rem; font-size: .78rem; margin-bottom: 1rem; display: none; }
    .alert.show { display: block; }
    .alert-error { background: rgba(244,63,94,.1); border: 1px solid rgba(244,63,94,.25); color: var(--error); }
    .alert-success { background: rgba(34,197,94,.1); border: 1px solid rgba(34,197,94,.25); color: var(--success); }
    .reset-link-box { background: var(--bg3); border: 1px solid rgba(13,148,136,.3); border-radius: var(--r); padding: .75rem 1rem; margin-top: .75rem; font-size: .72rem; word-break: break-all; color: var(--teal); display: none; }
    .reset-link-box.show { display: block; }
    .reset-link-label { font-size: .65rem; color: var(--muted); margin-bottom: .3rem; text-transform: uppercase; letter-spacing: .06em; }
    .btn-submit { width: 100%; padding: .75rem; background: var(--teal); color: #fff; border: none; border-radius: var(--r); font-family: var(--sans); font-size: .88rem; font-weight: 600; cursor: pointer; transition: all .2s; margin-top: .5rem; }
    .btn-submit:hover { background: #0f766e; transform: translateY(-1px); }
    .btn-submit:disabled { opacity: .6; cursor: not-allowed; transform: none; }
    .footer-links { text-align: center; margin-top: 1.5rem; font-size: .75rem; color: var(--muted); }
    .footer-links a { color: var(--teal); text-decoration: none; }
    .footer-links a:hover { text-decoration: underline; }
    .spinner { display: none; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: .4rem; }
    .btn-submit.loading .spinner { display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="bg-grid"></div>
  <div class="card">
    <a href="/" class="logo">RE<span>·</span>ANALYZE</a>
    <h1>Reset password</h1>
    <p class="subtitle">Enter your email to receive a password reset link.</p>

    <div class="alert alert-error" id="err-msg"></div>
    <div class="alert alert-success" id="ok-msg"></div>

    <!-- Step 1: request reset -->
    <div id="step-request">
      <form id="forgot-form" onsubmit="doForgot(event)">
        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email" />
        </div>
        <button type="submit" class="btn-submit" id="btn-forgot">
          <span class="spinner"></span>
          <span class="btn-text">Send Reset Link →</span>
        </button>
      </form>
      <div class="reset-link-box" id="reset-link-box">
        <div class="reset-link-label">Your reset link (copy and open in browser)</div>
        <a id="reset-link-url" href="#" style="color:var(--teal)"></a>
      </div>
    </div>

    <!-- Step 2: set new password (shown when ?token= in URL) -->
    <div id="step-reset" style="display:none">
      <form id="reset-form" onsubmit="doReset(event)">
        <div class="form-group">
          <label for="new-password">New password</label>
          <input type="password" id="new-password" name="password" placeholder="Minimum 6 characters" required minlength="6" autocomplete="new-password" />
        </div>
        <div class="form-group">
          <label for="confirm-pw">Confirm password</label>
          <input type="password" id="confirm-pw" name="confirm" placeholder="Repeat password" required autocomplete="new-password" />
        </div>
        <button type="submit" class="btn-submit" id="btn-reset">
          <span class="spinner"></span>
          <span class="btn-text">Set New Password →</span>
        </button>
      </form>
    </div>

    <div class="footer-links">
      <a href="/login">← Back to sign in</a>
    </div>
  </div>

  <script>
    const _token = new URLSearchParams(location.search).get('token');
    if (_token) {
      document.getElementById('step-request').style.display = 'none';
      document.getElementById('step-reset').style.display = '';
      document.querySelector('h1').textContent = 'Set new password';
      document.querySelector('.subtitle').textContent = 'Enter your new password below.';
    }

    async function doForgot(e) {
      e.preventDefault();
      const btn   = document.getElementById('btn-forgot');
      const errEl = document.getElementById('err-msg');
      const okEl  = document.getElementById('ok-msg');
      errEl.classList.remove('show'); okEl.classList.remove('show');
      btn.classList.add('loading'); btn.disabled = true;

      const email = document.getElementById('email').value.trim();
      try {
        const res  = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });
        const data = await res.json();
        if (res.ok && data.ok) {
          okEl.textContent = data.message || 'Reset link generated.';
          okEl.classList.add('show');
          if (data.reset_url) {
            const box = document.getElementById('reset-link-box');
            const link = document.getElementById('reset-link-url');
            link.href = data.reset_url;
            link.textContent = data.reset_url;
            box.classList.add('show');
          }
        } else {
          errEl.textContent = data.error || 'Could not process request.';
          errEl.classList.add('show');
        }
      } catch {
        errEl.textContent = 'Connection error. Please try again.';
        errEl.classList.add('show');
      } finally {
        btn.classList.remove('loading'); btn.disabled = false;
      }
    }

    async function doReset(e) {
      e.preventDefault();
      const btn   = document.getElementById('btn-reset');
      const errEl = document.getElementById('err-msg');
      const okEl  = document.getElementById('ok-msg');
      errEl.classList.remove('show'); okEl.classList.remove('show');

      const password = document.getElementById('new-password').value;
      const confirm  = document.getElementById('confirm-pw').value;
      if (password !== confirm) {
        errEl.textContent = 'Passwords do not match.';
        errEl.classList.add('show'); return;
      }

      btn.classList.add('loading'); btn.disabled = true;
      try {
        const res  = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: _token, password }),
        });
        const data = await res.json();
        if (res.ok && data.ok) {
          okEl.textContent = 'Password updated! Redirecting to sign in…';
          okEl.classList.add('show');
          setTimeout(() => window.location.href = '/login', 2000);
        } else {
          errEl.textContent = data.error || 'Reset failed. The link may have expired.';
          errEl.classList.add('show');
        }
      } catch {
        errEl.textContent = 'Connection error. Please try again.';
        errEl.classList.add('show');
      } finally {
        btn.classList.remove('loading'); btn.disabled = false;
      }
    }
  </script>
</body>
</html>
