<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — RE·ANALYZE</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --bg2: #161b27; --bg3: #1e2535;
      --border: rgba(99,120,170,.18); --text: #e2e8f0; --muted: #64748b;
      --teal: #0d9488; --error: #f43f5e; --success: #22c55e;
      --mono: 'JetBrains Mono', monospace; --sans: 'Inter', sans-serif; --r: 8px;
    }
    body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
    .bg-glow { position: absolute; inset: 0; pointer-events: none; background: radial-gradient(ellipse 60% 50% at 70% 30%, rgba(13,148,136,.1) 0%, transparent 60%), radial-gradient(ellipse 50% 40% at 30% 70%, rgba(59,130,246,.07) 0%, transparent 50%); }
    .bg-grid { position: absolute; inset: 0; pointer-events: none; background-image: linear-gradient(rgba(99,120,170,.04) 1px, transparent 1px), linear-gradient(90deg, rgba(99,120,170,.04) 1px, transparent 1px); background-size: 48px 48px; }
    .card { position: relative; z-index: 1; background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 2.5rem 2.25rem; width: 100%; max-width: 420px; margin: 1rem; }
    .logo { font-family: var(--mono); font-size: 1.1rem; color: var(--teal); letter-spacing: .05em; margin-bottom: 1.75rem; display: block; text-align: center; text-decoration: none; }
    .logo span { color: var(--muted); }
    h1 { font-size: 1.35rem; font-weight: 700; text-align: center; margin-bottom: .4rem; }
    .subtitle { font-size: .78rem; color: var(--muted); text-align: center; margin-bottom: 2rem; }
    .form-group { margin-bottom: 1rem; }
    label { display: block; font-size: .75rem; font-weight: 500; color: var(--muted); margin-bottom: .45rem; letter-spacing: .02em; }
    input { width: 100%; padding: .7rem .9rem; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--r); color: var(--text); font-family: var(--sans); font-size: .85rem; outline: none; transition: border-color .2s; }
    input:focus { border-color: var(--teal); }
    input::placeholder { color: var(--muted); }
    .alert { border-radius: var(--r); padding: .65rem .9rem; font-size: .78rem; margin-bottom: 1rem; display: none; }
    .alert.show { display: block; }
    .alert-error { background: rgba(244,63,94,.1); border: 1px solid rgba(244,63,94,.25); color: var(--error); }
    .alert-success { background: rgba(34,197,94,.1); border: 1px solid rgba(34,197,94,.25); color: var(--success); }
    .btn-submit { width: 100%; padding: .75rem; background: var(--teal); color: #fff; border: none; border-radius: var(--r); font-family: var(--sans); font-size: .88rem; font-weight: 600; cursor: pointer; transition: all .2s; margin-top: .5rem; }
    .btn-submit:hover { background: #0f766e; transform: translateY(-1px); }
    .btn-submit:disabled { opacity: .6; cursor: not-allowed; transform: none; }
    .footer-links { text-align: center; margin-top: 1.5rem; font-size: .75rem; color: var(--muted); }
    .footer-links a { color: var(--teal); text-decoration: none; }
    .footer-links a:hover { text-decoration: underline; }
    .spinner { display: none; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: .4rem; }
    .btn-submit.loading .spinner { display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .pw-hint { font-size: .68rem; color: var(--muted); margin-top: .35rem; }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="bg-grid"></div>
  <div class="card">
    <a href="/" class="logo">RE<span>·</span>ANALYZE</a>
    <h1>Create account</h1>
    <p class="subtitle">Sign up to access the intelligence dashboard</p>

    <div class="alert alert-error" id="err-msg"></div>
    <div class="alert alert-success" id="ok-msg"></div>

    <form id="signup-form" onsubmit="doSignup(event)">
      <div class="form-group">
        <label for="name">Full name</label>
        <input type="text" id="name" name="name" placeholder="Your name" required autocomplete="name" />
      </div>
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Minimum 6 characters" required autocomplete="new-password" minlength="6" />
        <div class="pw-hint">At least 6 characters</div>
      </div>
      <div class="form-group">
        <label for="confirm">Confirm password</label>
        <input type="password" id="confirm" name="confirm" placeholder="Repeat password" required autocomplete="new-password" />
      </div>
      <button type="submit" class="btn-submit" id="btn-submit">
        <span class="spinner"></span>
        <span class="btn-text">Create Account →</span>
      </button>
    </form>

    <div class="footer-links">
      Already have an account? <a href="/login">Sign in</a>
    </div>
  </div>

  <script>
    async function doSignup(e) {
      e.preventDefault();
      const btn   = document.getElementById('btn-submit');
      const errEl = document.getElementById('err-msg');
      const okEl  = document.getElementById('ok-msg');
      errEl.classList.remove('show'); okEl.classList.remove('show');

      const name     = document.getElementById('name').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm').value;

      if (password !== confirm) {
        errEl.textContent = 'Passwords do not match.';
        errEl.classList.add('show'); return;
      }

      btn.classList.add('loading'); btn.disabled = true;
      try {
        const res  = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password }),
        });
        const data = await res.json();
        if (res.ok && data.ok) {
          okEl.textContent = 'Account created! Redirecting to sign in…';
          okEl.classList.add('show');
          document.getElementById('signup-form').reset();
          setTimeout(() => window.location.href = '/login', 1800);
        } else {
          errEl.textContent = data.error || 'Could not create account. Please try again.';
          errEl.classList.add('show');
        }
      } catch {
        errEl.textContent = 'Connection error. Please try again.';
        errEl.classList.add('show');
      } finally {
        btn.classList.remove('loading'); btn.disabled = false;
      }
    }
  </script>
</body>
</html>
